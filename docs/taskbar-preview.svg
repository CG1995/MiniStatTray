    <rect x="21" y="0" width="15" height="15" rx="2" fill="#161a1d"/>
    <rect x="21" y="2" width="3" height="13" fill="#5daeff"/>
    <text x="34.5" y="10.8" text-anchor="end" font-family="Arial Narrow, Segoe UI, sans-serif" font-size="9" font-weight="700" fill="#fff">33</text>

    <rect x="0" y="21" width="15" height="15" rx="2" fill="#161a1d"/>
    <rect x="0" y="28" width="8" height="8" fill="#e6b848"/>
    <text x="13.5" y="31.8" text-anchor="end" font-family="Arial Narrow, Segoe UI, sans-serif" font-size="9" font-weight="700" fill="#fff">39</text>

