<svg xmlns="http://www.w3.org/2000/svg" width="260" height="420" viewBox="0 0 260 420" role="img" aria-label="MiniStatTray taskbar preview">
  <defs>
    <linearGradient id="wallpaper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#314347"/>
      <stop offset="0.45" stop-color="#496a59"/>
      <stop offset="1" stop-color="#23323a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="260" height="420" fill="url(#wallpaper)"/>
  <rect x="0" y="0" width="54" height="420" fill="#20272c" opacity="0.96"/>
  <rect x="54" y="0" width="1" height="420" fill="#586167" opacity="0.7"/>

  <g fill="#f1f5f7" opacity="0.95">
