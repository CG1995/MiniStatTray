    <line x1="32" y1="63" x2="37" y2="68" stroke="#f1f5f7" stroke-width="2" stroke-linecap="round"/>
    <rect x="19" y="91" width="16" height="14" rx="1" fill="none" stroke="#f1f5f7" stroke-width="2"/>
    <line x1="19" y1="98" x2="35" y2="98" stroke="#f1f5f7" stroke-width="2"/>
  </g>

  <g transform="translate(12 142)" filter="url(#shadow)">
